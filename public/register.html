  <style>
/* ===== EcomStein — design tokens (from Framer "Message" theme) ===== */

:root {
    --bg: #0a0a0a;
    --bg-soft: #0c0c0c;
    --surface: #121212;
    --surface-2: #171717;
    --text: #ffffff;
    --muted: #8a8a8a;
    --muted-2: #a9a9a9;
    --border: rgba(255, 255, 255, 0.12);
    --border-soft: rgba(255, 255, 255, 0.07);
    --accent: #FF4211;
    --accent-dim: rgba(255, 179, 156, 0.18);
    --maxw: 1128px;
    --radius: 18px;
    --radius-lg: 32px;
    --font-head: 'Host Grotesk', -apple-system, system-ui, sans-serif;
    --font-body: 'DM Sans', -apple-system, system-ui, sans-serif;
}

*,
*::before,
*::after {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

a {
    color: inherit;
    text-decoration: none;
}

img {
    max-width: 100%;
    display: block;
}

h1,
h2,
h3,
h4 {
    font-family: var(--font-head);
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.03em;
}

p {
    margin: 0;
}

.container {
    width: 100%;
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 24px;
}

.section {
    padding: 96px 0;
}

.section--tight {
    padding: 64px 0;
}

/* buttons */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 15px;
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .15s ease, filter .15s ease, opacity .15s ease, background .15s ease, box-shadow .15s ease;
    white-space: nowrap;
}

.btn--primary {
    background: #fff;
    color: #0a0a0a;
}

.btn--primary:hover {
    transform: translateY(-1px);
    opacity: .92;
}

.btn--accent {
    background: var(--accent);
    color: #101604;
    font-weight: 600;
    box-shadow: 0 8px 30px rgb(255 66 17 / 20%);
}

.btn--accent:hover {
    transform: translateY(-2px);
    filter: brightness(1.06);
    box-shadow: 0 12px 40px rgb(255 66 17 / 20%);
}

.btn--lg {
    padding: 15px 30px;
    font-size: 16px;
}

/* badge */

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted-2);
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.02);
}

.badge::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: dotPulse 2.4s ease-in-out infinite;
}

/* nav */

.nav {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(10, 10, 10, 0.72);
    border-bottom: 1px solid var(--border-soft);
}

.nav__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: -0.02em;
    color: #fff;
}

.logo__mark {
    color: var(--accent);
}

.nav__links {
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav__links a {
    font-size: 15px;
    color: var(--muted-2);
    transition: color .15s;
}

.nav__links a:hover {
    color: #fff;
}

.nav__cta {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav__toggle {
    display: none;
    background: none;
    border: 0;
    color: #fff;
    cursor: pointer;
    padding: 6px;
}

.mobile-menu {
    display: none;
}

/* hero */

.hero {
    position: relative;
    overflow: hidden;
    text-align: center;
    padding: 50px 0 96px;
}

.hero__bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}

.hero__bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: .55;
}

.hero__bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10, 10, 10, 0.25), var(--bg) 94%);
}

.hero__glow {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(46% 42% at 50% 2%, rgba(232, 255, 156, 0.16), transparent 70%);
}

.hero__inner {
    position: relative;
    z-index: 1;
    max-width: 880px;
}

.hero h1 {
    font-size: clamp(38px, 6vw, 60px);
    line-height: 1.04;
    margin: 24px 0 18px;
    font-weight: 500;
}

.hero h1 em {
    font-style: italic;
    color: var(--accent);
}

.hero__sub {
    font-size: clamp(17px, 2.2vw, 20px);
    color: var(--muted-2);
    max-width: 731px;
    margin: 0 auto 34px;
    line-height: 1.5;
}

.hero__form {
    max-width: 480px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
    text-align: left;
}

.hero__form-head {
    font-family: var(--font-head);
    font-size: 18px;
    margin-bottom: 16px;
    text-align: center;
}

.kit-slot {
    min-height: 48px;
}

.hero__note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    text-align: center;
}

.hero__trust {
    font-size: 14px;
    color: var(--muted);
    margin-top: 26px;
}

/* section heading */

.shead {
    max-width: 620px;
    margin-bottom: 44px;
}

.shead--center {
    margin-left: auto;
    margin-right: auto;
    text-align: center;
}

.shead h2 {
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.12;
    margin: 16px 0 0;
}

.shead p {
    color: var(--muted-2);
    margin-top: 14px;
    font-size: 17px;
}

/* feature cards */

.feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.fcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.fcard:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.fcard__img {
    aspect-ratio: 16/11;
    overflow: hidden;
    border-bottom: 1px solid var(--border-soft);
}

.fcard__img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .5s cubic-bezier(.2, .7, .2, 1);
}

.fcard:hover .fcard__img img {
    transform: scale(1.06);
}

.fcard__body {
    padding: 24px;
}

.fcard__body h3 {
    font-family: var(--font-head);
    font-size: 20px;
    margin: 0 0 8px;
}

.fcard__body p {
    color: var(--muted-2);
    font-size: 15px;
}

/* niche grid */

.niche-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.niche {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.niche:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.niche__k {
    font-family: var(--font-head);
    font-size: 18px;
    margin: 0 0 8px;
}

.niche p {
    color: var(--muted);
    font-size: 14px;
}

/* how it works */

.how {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: center;
}

.how__media {
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border-soft);
    aspect-ratio: 4/3;
}

.how__media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .6s cubic-bezier(.2, .7, .2, 1);
}

.how__media:hover img {
    transform: scale(1.04);
}

.steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.step {
    display: flex;
    gap: 16px;
    padding: 18px 20px;
    border-left: 2px solid var(--border);
    transition: border-color .25s, background .25s;
    border-radius: 0 10px 10px 0;
}

.step--active {
    border-left-color: var(--accent);
}

.step:hover {
    background: rgba(255, 255, 255, 0.02);
    border-left-color: var(--accent);
}

.step__n {
    font-family: var(--font-head);
    font-size: 14px;
    color: var(--accent);
    min-width: 30px;
    font-weight: 600;
}

.step__t {
    font-family: var(--font-head);
    font-size: 18px;
    margin: 0 0 4px;
}

.step p {
    color: var(--muted);
    font-size: 15px;
}

/* benefits */

.bgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.bcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 26px;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.bcard:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.bcard h3 {
    font-family: var(--font-head);
    font-size: 18px;
    margin: 0 0 8px;
}

.bcard p {
    color: var(--muted);
    font-size: 15px;
}

.bcard__icon {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
    margin-bottom: 16px;
    color: var(--accent);
    transition: transform .25s;
}

.bcard:hover .bcard__icon {
    transform: scale(1.08) rotate(-4deg);
}

.bcard__icon svg {
    width: 19px;
    height: 19px;
}

/* testimonials */

.tgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.tcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.tcard:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.tcard p {
    font-size: 15px;
    color: #e8e8e8;
    line-height: 1.55;
}

.tcard__who {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: auto;
}

.tcard__av {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 16px;
    color: #0a0a0a;
    background: linear-gradient(135deg, #FF4211, #5a6b2e);
}

.tcard:nth-child(2) .tcard__av {
    background: linear-gradient(135deg, #ffb56b, #a85a22);
}

.tcard:nth-child(3) .tcard__av {
    background: linear-gradient(135deg, #7fe6ff, #2a6ea8);
    color: #04121a;
}

.tcard:nth-child(4) .tcard__av {
    background: linear-gradient(135deg, #b89cff, #5a3fb0);
    color: #0a0414;
}

.tcard:nth-child(5) .tcard__av {
    background: linear-gradient(135deg, #ff9cc7, #b03f74);
    color: #160410;
}

.tcard:nth-child(6) .tcard__av {
    background: linear-gradient(135deg, #9cffd0, #2ea877);
    color: #04140d;
}

.tcard__nm {
    font-weight: 500;
    font-size: 14px;
}

.tcard__role {
    font-size: 13px;
    color: var(--muted);
}

/* faq */

.faq {
    max-width: 760px;
    margin: 0 auto;
}

.faq details {
    border-bottom: 1px solid var(--border-soft);
}

.faq summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 22px 4px;
    font-family: var(--font-head);
    font-size: 18px;
    transition: color .2s;
}

.faq summary:hover {
    color: var(--accent);
}

.faq summary::-webkit-details-marker {
    display: none;
}

.faq summary::after {
    content: "+";
    color: var(--accent);
    font-size: 24px;
    line-height: 1;
    transition: transform .2s;
}

.faq details[open] summary::after {
    transform: rotate(45deg);
}

.faq__a {
    padding: 0 4px 22px;
    color: var(--muted-2);
    font-size: 15px;
    line-height: 1.6;
    max-width: 660px;
}

/* final cta */

.final {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-lg);
    max-width: var(--maxw);
    margin: 0 auto;
}

.final__bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}

.final__bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: .5;
}

.final__bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, var(--bg) 8%, rgba(10, 10, 10, 0.45));
}

.final__inner {
    position: relative;
    z-index: 1;
    padding: 80px 48px;
    max-width: 620px;
}

.final h2 {
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.1;
}

.final p {
    color: var(--muted-2);
    margin: 16px 0 28px;
    font-size: 18px;
}

/* footer */

.footer {
    border-top: 1px solid var(--border-soft);
    padding: 48px 0;
    text-align: center;
    color: var(--muted);
}

.footer .logo {
    justify-content: center;
    margin-bottom: 14px;
}

.footer__dis {
    font-size: 13px;
    max-width: 480px;
    margin: 0 auto 8px;
}

.footer__cp {
    font-size: 13px;
}

/* ===== animations ===== */

@keyframes dotPulse {
    0%,
    100% {
        box-shadow: 0 0 6px var(--accent);
        opacity: .85;
    }
    50% {
        box-shadow: 0 0 14px var(--accent);
        opacity: 1;
    }
}

@keyframes glowPulse {
    0%,
    100% {
        opacity: .55;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.08);
    }
}

@media (prefers-reduced-motion: no-preference) {
    .js [data-reveal] {
        opacity: 0;
        transform: translateY(26px);
        transition: opacity .7s cubic-bezier(.2, .7, .2, 1), transform .7s cubic-bezier(.2, .7, .2, 1);
        will-change: opacity, transform;
    }
    .js [data-reveal].in {
        opacity: 1;
        transform: none;
    }
    .js [data-reveal-delay="1"] {
        transition-delay: .07s;
    }
    .js [data-reveal-delay="2"] {
        transition-delay: .14s;
    }
    .js [data-reveal-delay="3"] {
        transition-delay: .21s;
    }
    .js [data-reveal-delay="4"] {
        transition-delay: .28s;
    }
    .js [data-reveal-delay="5"] {
        transition-delay: .35s;
    }
    .hero__glow {
        animation: glowPulse 7s ease-in-out infinite;
    }
}

/* responsive */

@media (max-width:900px) {
    .nav__links {
        display: none;
    }
    .nav__cta .btn {
        display: none;
    }
    .nav__toggle {
        display: block;
    }
    .feature-grid {
        grid-template-columns: 1fr;
    }
    .niche-grid {
        grid-template-columns: 1fr 1fr;
    }
    .how {
        grid-template-columns: 1fr;
        gap: 28px;
    }
    .bgrid {
        grid-template-columns: 1fr;
    }
    .tgrid {
        grid-template-columns: 1fr 1fr;
    }
    .section {
        padding: 72px 0;
    }
    .mobile-menu.open {
        display: flex;
        flex-direction: column;
        padding: 8px 24px 18px;
        background: var(--bg);
        border-bottom: 1px solid var(--border-soft);
    }
    .mobile-menu a {
        padding: 13px 4px;
        color: var(--muted-2);
        border-bottom: 1px solid var(--border-soft);
    }
    .mobile-menu .btn {
        margin-top: 14px;
        width: 100%;
    }
}

@media (max-width:560px) {
    .niche-grid {
        grid-template-columns: 1fr;
    }
    .tgrid {
        grid-template-columns: 1fr;
    }
    .hero {
        padding: 80px 0 68px;
    }
    .hero__form {
        padding: 20px;
    }
    .final__inner {
        padding: 52px 24px;
    }
    .final {
        border-radius: 24px;
    }
    .container {
        padding: 0 18px;
    }
}

/* ===== custom email form ===== */

.es-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.es-input {
    flex: 1 1 200px;
    min-width: 0;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #fff;
    font-family: var(--font-body);
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
}

.es-input::placeholder {
    color: #6a6a6a;
}

.es-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
}

.es-btn {
    flex: 0 0 auto;
    background: var(--accent);
    color: #101604;
    font-weight: 600;
    border: 0;
    border-radius: 10px;
    padding: 13px 22px;
    font-family: var(--font-body);
    font-size: 15px;
    cursor: pointer;
    transition: transform .15s, filter .15s;
}

.es-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.06);
}

.es-btn:disabled {
    opacity: .6;
    cursor: default;
    transform: none;
}

.es-ok {
    background: var(--accent-dim);
    border: 1px solid rgba(232, 255, 156, 0.4);
    color: var(--accent);
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 15px;
    text-align: center;
    font-weight: 500;
}

.es-err {
    color: #ff8a8a;
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
}

@media (max-width:520px) {
    .es-form .es-input,
    .es-form .es-btn {
        flex: 1 1 100%;
    }
}

/* ============================================================
   APP STYLES — auth, dashboard, watch view
   Extends the tokens defined in styles.css (same brand).
   ============================================================ */

:root {
  --discord: #5865F2;
  --discord-hover: #4752c4;
  --ok: #46d17f;
  --app-rail: 340px;
}

/* ---------- shared app chrome ---------- */
.appbar {
  position: sticky;
  top: 0;
  z-index: 50;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: rgba(10, 10, 10, 0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-soft);
}
.appbar .logo { font-size: 18px; }
.appbar__right { display: flex; align-items: center; gap: 14px; }

.userchip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 6px 6px 14px;
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.02);
  font-size: 14px;
  color: var(--muted-2);
}
.userchip__av {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-weight: 700; font-size: 14px;
  color: #101604;
  background: linear-gradient(135deg, var(--accent), #a8391a);
}
.linkbtn {
  background: none; border: 0; cursor: pointer;
  color: var(--muted); font-size: 14px; font-family: var(--font-body);
  padding: 8px 10px; border-radius: 8px; transition: color .15s, background .15s;
}
.linkbtn:hover { color: #fff; background: rgba(255,255,255,0.04); }

/* ---------- auth pages ---------- */
.auth {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px 20px;
  position: relative;
  overflow: hidden;
}
.auth__bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(48% 40% at 50% 0%, rgba(255,66,17,0.16), transparent 70%),
    radial-gradient(60% 50% at 50% 120%, rgba(255,66,17,0.10), transparent 70%);
  pointer-events: none;
}
.auth__card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 34px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  text-align: center;
}
.auth__logo {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-head); font-weight: 600; font-size: 19px;
  margin-bottom: 26px;
}
.auth__logo img { width: 30px; }
.auth h1 {
  font-size: 26px; letter-spacing: -0.03em; margin-bottom: 8px;
}
.auth__sub { color: var(--muted-2); font-size: 15px; margin-bottom: 28px; line-height: 1.5; }

.btn--discord {
  width: 100%;
  background: var(--discord);
  color: #fff;
  border: 0;
  border-radius: 12px;
  padding: 14px 18px;
  font-family: var(--font-body);
  font-weight: 600; font-size: 15px;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  transition: background .15s, transform .15s, box-shadow .15s;
  box-shadow: 0 8px 30px rgba(88,101,242,0.28);
}
.btn--discord:hover:not(:disabled) { background: var(--discord-hover); transform: translateY(-1px); }
.btn--discord:disabled { opacity: .8; cursor: default; }

.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.auth__alt {
  margin-top: 22px; font-size: 14px; color: var(--muted);
}
.auth__alt a { color: var(--accent); font-weight: 500; }
.auth__alt a:hover { text-decoration: underline; }
.auth__fine {
  margin-top: 26px; font-size: 12px; color: var(--muted);
  line-height: 1.5; max-width: 320px; margin-left: auto; margin-right: auto;
}
.auth__divider {
  display: flex; align-items: center; gap: 14px;
  color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
  margin: 22px 0;
}
.auth__divider::before, .auth__divider::after {
  content: ""; flex: 1; height: 1px; background: var(--border-soft);
}
.auth__form { text-align: left; }
.modal__field { margin-bottom: 14px; }
.modal__label { display: block; font-size: 13px; color: var(--muted-2); margin-bottom: 6px; }
.modal__input, .modal__select {
  width: 100%; padding: 11px 13px; border-radius: 10px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border-soft);
  color: #fff; font-size: 14px; font-family: var(--font-body);
  transition: border-color .15s;
}
.modal__input:focus, .modal__select:focus { outline: none; border-color: var(--accent-dim); }
.modal__select { appearance: none; cursor: pointer; }
.modal__select option { background: #14140f; color: #fff; }
.modal__msg { font-size: 13px; margin-top: 4px; min-height: 18px; }
.modal__msg.error { color: #ff6b5c; }
.modal__msg.success { color: #22C55E; }
.modal__submit { width: 100%; margin-top: 6px; justify-content: center; }
.modal__submit:disabled { opacity: 0.6; cursor: default; }

/* ---------- dashboard ---------- */
.dash { padding: 40px 24px 96px; max-width: 1180px; margin: 0 auto; }
.dash__head { margin-bottom: 32px; }
.dash__head h1 { font-size: clamp(26px, 3.5vw, 34px); letter-spacing: -0.03em; }
.dash__head p { color: var(--muted-2); margin-top: 8px; font-size: 16px; }

/* resume strip */
.resume {
  display: flex; align-items: center; gap: 20px;
  background: linear-gradient(120deg, rgba(255,66,17,0.10), rgba(255,66,17,0.02));
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 36px;
}
.resume__label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); font-weight: 600; }
.resume__title { font-family: var(--font-head); font-size: 17px; margin-top: 4px; }
.resume__meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
.resume__spacer { flex: 1; }

/* course grid — mirrors the app screenshot */
.courses {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(286px, 1fr));
  gap: 18px;
}
.ccard {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .25s, transform .25s, box-shadow .25s;
  display: flex; flex-direction: column;
}
.ccard:hover {
  border-color: var(--accent-dim);
  transform: translateY(-4px);
  box-shadow: 0 16px 44px rgba(0,0,0,.45);
}
.ccard__cover {
  aspect-ratio: 16/10;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border-soft);
  background: var(--accent);
}
.ccard__cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
.ccard:hover .ccard__cover img { transform: scale(1.05); }
.ccard__prog {
  position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
  background: rgba(0,0,0,0.35);
}
.ccard__prog i { display: block; height: 100%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
.ccard__body { padding: 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.ccard__title { font-family: var(--font-head); font-size: 17px; letter-spacing: -0.02em; }
.ccard__meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 14px; font-size: 13px; color: var(--muted); margin-top: auto; }
.ccard__meta span { display: inline-flex; align-items: center; gap: 5px; }
.ccard__dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

/* ---------- course / watch view ---------- */
.watch {
  display: grid;
  grid-template-columns: var(--app-rail) 1fr;
  min-height: calc(100vh - 64px);
}
.rail {
  border-right: 1px solid var(--border-soft);
  background: var(--bg-soft);
  overflow-y: auto;
  max-height: calc(100vh - 64px);
  position: sticky; top: 64px;
}
.rail__head { padding: 22px 20px 16px; border-bottom: 1px solid var(--border-soft); }
.rail__back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.rail__back:hover { color: #fff; }
.rail__title { font-family: var(--font-head); font-size: 18px; letter-spacing: -0.02em; line-height: 1.25; }
.rail__prog { margin-top: 14px; }
.rail__bar { height: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
.rail__bar i { display: block; height: 100%; background: var(--accent); transition: width .3s; }
.rail__pct { font-size: 12px; color: var(--muted); margin-top: 7px; }

.chap { border-bottom: 1px solid var(--border-soft); }
.chap__sum {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  padding: 15px 20px; color: #fff; font-family: var(--font-head);
  font-size: 14px; letter-spacing: -0.01em;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.chap__sum:hover { background: rgba(255,255,255,0.02); }
.chap__caret { color: var(--muted); transition: transform .2s; flex: 0 0 auto; }
.chap.open .chap__caret { transform: rotate(90deg); }
.chap__count { color: var(--muted); font-family: var(--font-body); font-weight: 400; font-size: 12px; }
.chap__list { display: none; padding: 4px 0 10px; }
.chap.open .chap__list { display: block; }

.lrow {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px 10px 20px; color: var(--muted-2); font-size: 13.5px;
  font-family: var(--font-body); line-height: 1.35;
  border-left: 2px solid transparent;
  transition: background .15s, color .15s;
}
.lrow:hover { background: rgba(255,255,255,0.02); color: #fff; }
.lrow.active { background: rgba(255,66,17,0.08); color: #fff; border-left-color: var(--accent); }
.lrow__check {
  flex: 0 0 auto; width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border); display: grid; place-items: center;
}
.lrow.done .lrow__check { background: var(--accent); border-color: var(--accent); }
.lrow.done .lrow__check svg { color: #101604; }
.lrow__t { flex: 1; }
.lrow__d { flex: 0 0 auto; color: var(--muted); font-size: 12px; }

.stage { padding: 28px 32px 64px; max-width: 1000px; }
.player {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
  border: 1px solid var(--border-soft);
}
.player video { width: 100%; height: 100%; object-fit: contain; background: #000; }
.player__placeholder {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background:
    radial-gradient(60% 60% at 50% 42%, rgba(255,66,17,0.12), transparent 70%),
    #060606;
  text-align: center;
}
.player__play {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--accent); display: grid; place-items: center;
  box-shadow: 0 0 40px rgba(255,66,17,0.5); margin: 0 auto 16px;
}
.player__note { color: var(--muted); font-size: 13px; }
.player__note b { color: var(--muted-2); font-weight: 500; }

.stage__crumb { font-size: 13px; color: var(--muted); margin: 22px 0 6px; }
.stage h1 { font-size: clamp(22px, 3vw, 28px); letter-spacing: -0.03em; }
.stage__row { display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
.stage__dur { font-size: 13px; color: var(--muted); }

.markbtn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--muted-2); border-radius: 10px; padding: 9px 15px;
  font-family: var(--font-body); font-size: 14px; cursor: pointer;
  transition: all .15s;
}
.markbtn:hover { border-color: var(--accent-dim); color: #fff; }
.markbtn.is-done { background: rgba(255,66,17,0.10); border-color: var(--accent); color: var(--accent); }

.navbtns { display: flex; gap: 10px; margin-left: auto; }
.navbtns button {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--muted-2);
  border-radius: 10px; padding: 9px 15px; font-family: var(--font-body); font-size: 14px; cursor: pointer;
  transition: all .15s;
}
.navbtns button:hover:not(:disabled) { border-color: var(--accent-dim); color: #fff; }
.navbtns button:disabled { opacity: .4; cursor: default; }

/* tabs: resources / notes */
.tabs { margin-top: 34px; border-top: 1px solid var(--border-soft); }
.tabs__nav { display: flex; gap: 4px; margin-top: 18px; }
.tabs__btn {
  background: none; border: 0; cursor: pointer; color: var(--muted);
  font-family: var(--font-body); font-size: 14px; padding: 10px 14px;
  border-radius: 8px 8px 0 0; border-bottom: 2px solid transparent;
}
.tabs__btn:hover { color: #fff; }
.tabs__btn.active { color: #fff; border-bottom-color: var(--accent); }
.tabs__panel { padding: 22px 2px; display: none; }
.tabs__panel.active { display: block; }

.res {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border-soft);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  transition: border-color .15s, transform .15s;
}
.res:hover { border-color: var(--accent-dim); transform: translateX(2px); }
.res__icon {
  width: 40px; height: 40px; border-radius: 10px; flex: 0 0 auto;
  background: var(--accent-dim); color: var(--accent);
  display: grid; place-items: center;
}
.res__name { font-size: 14px; font-weight: 500; }
.res__size { font-size: 12px; color: var(--muted); margin-top: 2px; }
.res__dl { margin-left: auto; color: var(--muted); }
.res__dl:hover { color: var(--accent); }
.empty { color: var(--muted); font-size: 14px; padding: 8px 0; }

/* mobile rail toggle */
.railtoggle {
  display: none;
  position: fixed; bottom: 20px; left: 20px; z-index: 60;
  background: var(--accent); color: #101604; border: 0;
  border-radius: 999px; padding: 12px 18px; font-weight: 600;
  font-family: var(--font-body); font-size: 14px; cursor: pointer;
  box-shadow: 0 10px 30px rgba(255,66,17,0.4);
}

@media (max-width: 900px) {
  .watch { grid-template-columns: 1fr; }
  .rail {
    position: fixed; top: 64px; left: 0; bottom: 0; width: min(340px, 86vw);
    z-index: 55; transform: translateX(-105%); transition: transform .25s;
    max-height: none; border-right: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  .rail.open { transform: none; }
  .railtoggle { display: block; }
  .stage { padding: 20px 18px 80px; }
}
@media (max-width: 560px) {
  .auth__card { padding: 32px 22px; }
  .stage__row { gap: 10px; }
  .navbtns { margin-left: 0; width: 100%; }
  .navbtns button { flex: 1; }
}

</style>

      <h1>Create your account</h1>
      <p class="auth__sub">Free, permanent access — pick how you want to sign up.</p>

      <button class="btn--discord" id="discordBtn">
        <span class="dc-mark"></span>
        <span>Continue with Discord</span>
      </button>

      <div class="auth__divider">or</div>

      <form class="auth__form" id="registerForm" novalidate>
        <div class="modal__field">
          <label class="modal__label" for="regEmail">Email</label>
          <input class="modal__input" type="email" id="regEmail" autocomplete="email" required>
        </div>
        <div class="modal__field">
          <label class="modal__label" for="regUsername">Username</label>
          <input class="modal__input" type="text" id="regUsername" autocomplete="username" required>
        </div>
        <div class="modal__field">
          <label class="modal__label" for="regPassword">Password</label>
          <input class="modal__input" type="password" id="regPassword" autocomplete="new-password" required>
        </div>
        <div class="modal__field">
          <label class="modal__label" for="regNiche">What niche are you interested in?</label>
          <select class="modal__select" id="regNiche" required>
            <option value="">Select one…</option>
            <option value="ecommerce">E-Commerce</option>
            <option value="ai-automation">AI &amp; Automation</option>
            <option value="affiliate">Affiliate Marketing</option>
            <option value="copywriting">Sales &amp; Copywriting</option>

            <option value="video-editing">Video Editing</option>

        </div>
        <div class="modal__msg" id="registerMsg"></div>
        <button type="submit" class="btn btn--accent modal__submit" id="registerSubmit">Create account</button>

/* ---- helpers (used across pages) ---- */
function getCourse(id) {
  return COURSES.find(function (c) { return c.id === id; });
}
function chapterLessons(ch) {
  var out = ch.lessons ? ch.lessons.slice() : [];
  if (ch.sections) {
    ch.sections.forEach(function (s) { out = out.concat(chapterLessons(s)); });
  }
  return out;
}
function courseStats(course) {
  var chapters = course.chapters.length;
  var lessons = 0;
  var totalMin = 0;
  course.chapters.forEach(function (ch) {
    chapterLessons(ch).forEach(function (ls) { lessons++; totalMin += parseDuration(ls.duration); });
  });
  return { chapters: chapters, lessons: lessons, duration: formatDuration(totalMin) };
}
function parseDuration(str) {
  // "1h 12m" | "52m" | "44m" -> minutes
  var h = /(\d+)\s*h/.exec(str);
  var m = /(\d+)\s*m/.exec(str);
  return (h ? +h[1] * 60 : 0) + (m ? +m[1] : 0);
}
function formatDuration(min) {
  var h = Math.floor(min / 60);
  var m = min % 60;
  if (h && m) return h + "h " + m + "m";
  if (h) return h + "h";
  return m + "m";
}
function collectLessons(ch, node, out) {
  if (node.lessons) {
    node.lessons.forEach(function (ls) { out.push({ chapter: ch, section: node === ch ? null : node, lesson: ls }); });
  }
  if (node.sections) {
    node.sections.forEach(function (s) { collectLessons(ch, s, out); });
  }
}
function allLessons(course) {
  var out = [];
  course.chapters.forEach(function (ch) { collectLessons(ch, ch, out); });
  return out;
}

  setLast: function (courseId, lessonId) {
    var d = this.all();
    d[courseId] = d[courseId] || { done: {}, last: null, time: {} };
    d[courseId].last = lessonId;
    this.save(d);
  },
  markDone: function (courseId, lessonId, value) {
    var d = this.all();
    d[courseId] = d[courseId] || { done: {}, last: null, time: {} };
    d[courseId].done[lessonId] = value !== false;
    this.save(d);
  },
  setTime: function (courseId, lessonId, seconds) {
    var d = this.all();
    d[courseId] = d[courseId] || { done: {}, last: null, time: {} };
    d[courseId].time[lessonId] = seconds;
    this.save(d);
  },
  percent: function (course) {
    var p = this.forCourse(course.id);
    var total = 0, done = 0;
    course.chapters.forEach(function (ch) {
      chapterLessons(ch).forEach(function (ls) { total++; if (p.done[ls.id]) done++; });
    });
    return total ? Math.round((done / total) * 100) : 0;
  },
};

/* ---- tiny helpers ---- */
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function initials(name) {
  return (name || "?").trim().slice(0, 1).toUpperCase();
}
function qs(name) {
  return new URLSearchParams(location.search).get(name);
}

/* ---- kick off the real Discord OAuth flow (server handles the rest) ---- */
function startDiscordAuth(btn) {
  btn.disabled = true;
  btn.innerHTML = discordSpinner() + "<span>Redirecting to Discord…</span>";
  location.href = "/auth/discord";
}
function discordSpinner() {
  return '<span class="spin" aria-hidden="true"></span>';
}
function discordMark() {
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
    '<path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.078.037c-.211.375-.446.865-.61 1.249a18.27 18.27 0 0 0-5.487 0 12.6 12.6 0 0 0-.617-1.25.077.077 0 0 0-.079-.036A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.891.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.055c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.028ZM8.02 15.331c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.42 2.157-2.42 1.211 0 2.176 1.096 2.157 2.42 0 1.333-.955 2.419-2.157 2.419Zm7.975 0c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.42 2.157-2.42 1.211 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419Z"/>' +
    '</svg>';
}

</script>
  <script>
    // capture an affiliate referral code, if present, so it survives through
    // registration (including a Discord OAuth round-trip)
    (function () {
      var ref = new URLSearchParams(location.search).get("ref");
      if (ref) document.cookie = "ref_code=" + encodeURIComponent(ref) + "; path=/; max-age=" + (30 * 24 * 60 * 60);
    })();

    // If already signed in, skip straight to the dashboard.
    Auth.me().then(function (user) { if (user) location.href = "library"; });
    var btn = document.getElementById("discordBtn");
    btn.querySelector(".dc-mark").innerHTML = discordMark();
    btn.addEventListener("click", function () { startDiscordAuth(btn); });

    var registerMsg = document.getElementById("registerMsg");
    var registerSubmit = document.getElementById("registerSubmit");
    var REGISTER_ERRORS = {
      invalid_email: "Enter a valid email address.",
      invalid_username: "Username must be 3–32 characters.",
      weak_password: "Password must be at least 8 characters.",
      missing_niche: "Pick a niche you're interested in.",
      already_exists: "That email or username is already taken.",
      account_storage_not_configured: "Sign-ups aren't available right now — try Discord instead.",
      ip_limit_reached: "An account has already been created from this network. Only one account per IP is allowed.",
    };
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var payload = {
        email: document.getElementById("regEmail").value.trim(),
        username: document.getElementById("regUsername").value.trim(),
        password: document.getElementById("regPassword").value,
        niche: document.getElementById("regNiche").value,
      };
      if (!payload.email || !payload.username || !payload.password || !payload.niche) {
        registerMsg.className = "modal__msg error";
        registerMsg.textContent = "Fill in every field.";
        return;
      }
      registerSubmit.disabled = true;
      registerMsg.className = "modal__msg";
      registerMsg.textContent = "Creating your account…";
      fetch("/auth/register", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      })
        .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
        .then(function (res) {
          if (res.ok) {
            registerMsg.className = "modal__msg success";
            registerMsg.textContent = "Account created — redirecting…";
            location.href = "library";
          } else {
            registerSubmit.disabled = false;
            registerMsg.className = "modal__msg error";
            registerMsg.textContent = REGISTER_ERRORS[res.data.error] || "Something went wrong — try again.";
          }
        })
        .catch(function () {
          registerSubmit.disabled = false;
          registerMsg.className = "modal__msg error";
          registerMsg.textContent = "Something went wrong — try again.";
        });
    });
  </script>
</body>
