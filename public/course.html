  <style>
/* ===== EcomStein — design tokens (from Framer "Message" theme) ===== */

:root {
    --bg: #0a0a0a;
    --bg-soft: #0c0c0c;
    --surface: #121212;
    --surface-2: #171717;
    --text: #ffffff;
    --muted: #8a8a8a;
    --muted-2: #a9a9a9;
    --border: rgba(255, 255, 255, 0.12);
    --border-soft: rgba(255, 255, 255, 0.07);
    --accent: #FF4211;
    --accent-dim: rgba(255, 179, 156, 0.18);
    --maxw: 1128px;
    --radius: 18px;
    --radius-lg: 32px;
    --font-head: 'Host Grotesk', -apple-system, system-ui, sans-serif;
    --font-body: 'DM Sans', -apple-system, system-ui, sans-serif;
}

*,
*::before,
*::after {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

a {
    color: inherit;
    text-decoration: none;
}

img {
    max-width: 100%;
    display: block;
}

h1,
h2,
h3,
h4 {
    font-family: var(--font-head);
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.03em;
}

p {
    margin: 0;
}

.container {
    width: 100%;
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 24px;
}

.section {
    padding: 96px 0;
}

.section--tight {
    padding: 64px 0;
}

/* buttons */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 15px;
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .15s ease, filter .15s ease, opacity .15s ease, background .15s ease, box-shadow .15s ease;
    white-space: nowrap;
}

.btn--primary {
    background: #fff;
    color: #0a0a0a;
}

.btn--primary:hover {
    transform: translateY(-1px);
    opacity: .92;
}

.btn--accent {
    background: var(--accent);
    color: #101604;
    font-weight: 600;
    box-shadow: 0 8px 30px rgb(255 66 17 / 20%);
}

.btn--accent:hover {
    transform: translateY(-2px);
    filter: brightness(1.06);
    box-shadow: 0 12px 40px rgb(255 66 17 / 20%);
}

.btn--lg {
    padding: 15px 30px;
    font-size: 16px;
}

/* badge */

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted-2);
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.02);
}

.badge::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: dotPulse 2.4s ease-in-out infinite;
}

/* nav */

.nav {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(10, 10, 10, 0.72);
    border-bottom: 1px solid var(--border-soft);
}

.nav__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: -0.02em;
    color: #fff;
}

.logo__mark {
    color: var(--accent);
}

.nav__links {
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav__links a {
    font-size: 15px;
    color: var(--muted-2);
    transition: color .15s;
}

.nav__links a:hover {
    color: #fff;
}

.nav__cta {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav__toggle {
    display: none;
    background: none;
    border: 0;
    color: #fff;
    cursor: pointer;
    padding: 6px;
}

.mobile-menu {
    display: none;
}

/* hero */

.hero {
    position: relative;
    overflow: hidden;
    text-align: center;
    padding: 50px 0 96px;
}

.hero__bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}

.hero__bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: .55;
}

.hero__bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10, 10, 10, 0.25), var(--bg) 94%);
}

.hero__glow {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(46% 42% at 50% 2%, rgba(232, 255, 156, 0.16), transparent 70%);
}

.hero__inner {
    position: relative;
    z-index: 1;
    max-width: 880px;
}

.hero h1 {
    font-size: clamp(38px, 6vw, 60px);
    line-height: 1.04;
    margin: 24px 0 18px;
    font-weight: 500;
}

.hero h1 em {
    font-style: italic;
    color: var(--accent);
}

.hero__sub {
    font-size: clamp(17px, 2.2vw, 20px);
    color: var(--muted-2);
    max-width: 731px;
    margin: 0 auto 34px;
    line-height: 1.5;
}

.hero__form {
    max-width: 480px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
    text-align: left;
}

.hero__form-head {
    font-family: var(--font-head);
    font-size: 18px;
    margin-bottom: 16px;
    text-align: center;
}

.kit-slot {
    min-height: 48px;
}

.hero__note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    text-align: center;
}

.hero__trust {
    font-size: 14px;
    color: var(--muted);
    margin-top: 26px;
}

/* section heading */

.shead {
    max-width: 620px;
    margin-bottom: 44px;
}

.shead--center {
    margin-left: auto;
    margin-right: auto;
    text-align: center;
}

.shead h2 {
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.12;
    margin: 16px 0 0;
}

.shead p {
    color: var(--muted-2);
    margin-top: 14px;
    font-size: 17px;
}

/* feature cards */

.feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.fcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.fcard:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.fcard__img {
    aspect-ratio: 16/11;
    overflow: hidden;
    border-bottom: 1px solid var(--border-soft);
}

.fcard__img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .5s cubic-bezier(.2, .7, .2, 1);
}

.fcard:hover .fcard__img img {
    transform: scale(1.06);
}

.fcard__body {
    padding: 24px;
}

.fcard__body h3 {
    font-family: var(--font-head);
    font-size: 20px;
    margin: 0 0 8px;
}

.fcard__body p {
    color: var(--muted-2);
    font-size: 15px;
}

/* niche grid */

.niche-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.niche {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.niche:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.niche__k {
    font-family: var(--font-head);
    font-size: 18px;
    margin: 0 0 8px;
}

.niche p {
    color: var(--muted);
    font-size: 14px;
}

/* how it works */

.how {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: center;
}

.how__media {
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border-soft);
    aspect-ratio: 4/3;
}

.how__media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .6s cubic-bezier(.2, .7, .2, 1);
}

.how__media:hover img {
    transform: scale(1.04);
}

.steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.step {
    display: flex;
    gap: 16px;
    padding: 18px 20px;
    border-left: 2px solid var(--border);
    transition: border-color .25s, background .25s;
    border-radius: 0 10px 10px 0;
}

.step--active {
    border-left-color: var(--accent);
}

.step:hover {
    background: rgba(255, 255, 255, 0.02);
    border-left-color: var(--accent);
}

.step__n {
    font-family: var(--font-head);
    font-size: 14px;
    color: var(--accent);
    min-width: 30px;
    font-weight: 600;
}

.step__t {
    font-family: var(--font-head);
    font-size: 18px;
    margin: 0 0 4px;
}

.step p {
    color: var(--muted);
    font-size: 15px;
}

/* benefits */

.bgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.bcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 26px;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.bcard:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.bcard h3 {
    font-family: var(--font-head);
    font-size: 18px;
    margin: 0 0 8px;
}

.bcard p {
    color: var(--muted);
    font-size: 15px;
}

.bcard__icon {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
    margin-bottom: 16px;
    color: var(--accent);
    transition: transform .25s;
}

.bcard:hover .bcard__icon {
    transform: scale(1.08) rotate(-4deg);
}

.bcard__icon svg {
    width: 19px;
    height: 19px;
}

/* testimonials */

.tgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.tcard {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: border-color .25s, transform .25s, box-shadow .25s;
}

.tcard:hover {
    border-color: var(--accent-dim);
    transform: translateY(-4px);
    box-shadow: 0 16px 44px rgba(0, 0, 0, .42);
}

.tcard p {
    font-size: 15px;
    color: #e8e8e8;
    line-height: 1.55;
}

.tcard__who {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: auto;
}

.tcard__av {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 16px;
    color: #0a0a0a;
    background: linear-gradient(135deg, #FF4211, #5a6b2e);
}

.tcard:nth-child(2) .tcard__av {
    background: linear-gradient(135deg, #ffb56b, #a85a22);
}

.tcard:nth-child(3) .tcard__av {
    background: linear-gradient(135deg, #7fe6ff, #2a6ea8);
    color: #04121a;
}

.tcard:nth-child(4) .tcard__av {
    background: linear-gradient(135deg, #b89cff, #5a3fb0);
    color: #0a0414;
}

.tcard:nth-child(5) .tcard__av {
    background: linear-gradient(135deg, #ff9cc7, #b03f74);
    color: #160410;
}

.tcard:nth-child(6) .tcard__av {
    background: linear-gradient(135deg, #9cffd0, #2ea877);
    color: #04140d;
}

.tcard__nm {
    font-weight: 500;
    font-size: 14px;
}

.tcard__role {
    font-size: 13px;
    color: var(--muted);
}

/* faq */

.faq {
    max-width: 760px;
    margin: 0 auto;
}

.faq details {
    border-bottom: 1px solid var(--border-soft);
}

.faq summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 22px 4px;
    font-family: var(--font-head);
    font-size: 18px;
    transition: color .2s;
}

.faq summary:hover {
    color: var(--accent);
}

.faq summary::-webkit-details-marker {
    display: none;
}

.faq summary::after {
    content: "+";
    color: var(--accent);
    font-size: 24px;
    line-height: 1;
    transition: transform .2s;
}

.faq details[open] summary::after {
    transform: rotate(45deg);
}

.faq__a {
    padding: 0 4px 22px;
    color: var(--muted-2);
    font-size: 15px;
    line-height: 1.6;
    max-width: 660px;
}

/* final cta */

.final {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-lg);
    max-width: var(--maxw);
    margin: 0 auto;
}

.final__bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}

.final__bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: .5;
}

.final__bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, var(--bg) 8%, rgba(10, 10, 10, 0.45));
}

.final__inner {
    position: relative;
    z-index: 1;
    padding: 80px 48px;
    max-width: 620px;
}

.final h2 {
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.1;
}

.final p {
    color: var(--muted-2);
    margin: 16px 0 28px;
    font-size: 18px;
}

/* footer */

.footer {
    border-top: 1px solid var(--border-soft);
    padding: 48px 0;
    text-align: center;
    color: var(--muted);
}

.footer .logo {
    justify-content: center;
    margin-bottom: 14px;
}

.footer__dis {
    font-size: 13px;
    max-width: 480px;
    margin: 0 auto 8px;
}

.footer__cp {
    font-size: 13px;
}

/* ===== animations ===== */

@keyframes dotPulse {
    0%,
    100% {
        box-shadow: 0 0 6px var(--accent);
        opacity: .85;
    }
    50% {
        box-shadow: 0 0 14px var(--accent);
        opacity: 1;
    }
}

@keyframes glowPulse {
    0%,
    100% {
        opacity: .55;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.08);
    }
}

@media (prefers-reduced-motion: no-preference) {
    .js [data-reveal] {
        opacity: 0;
        transform: translateY(26px);
        transition: opacity .7s cubic-bezier(.2, .7, .2, 1), transform .7s cubic-bezier(.2, .7, .2, 1);
        will-change: opacity, transform;
    }
    .js [data-reveal].in {
        opacity: 1;
        transform: none;
    }
    .js [data-reveal-delay="1"] {
        transition-delay: .07s;
    }
    .js [data-reveal-delay="2"] {
        transition-delay: .14s;
    }
    .js [data-reveal-delay="3"] {
        transition-delay: .21s;
    }
    .js [data-reveal-delay="4"] {
        transition-delay: .28s;
    }
    .js [data-reveal-delay="5"] {
        transition-delay: .35s;
    }
    .hero__glow {
        animation: glowPulse 7s ease-in-out infinite;
    }
}

/* responsive */

@media (max-width:900px) {
    .nav__links {
        display: none;
    }
    .nav__cta .btn {
        display: none;
    }
    .nav__toggle {
        display: block;
    }
    .feature-grid {
        grid-template-columns: 1fr;
    }
    .niche-grid {
        grid-template-columns: 1fr 1fr;
    }
    .how {
        grid-template-columns: 1fr;
        gap: 28px;
    }
    .bgrid {
        grid-template-columns: 1fr;
    }
    .tgrid {
        grid-template-columns: 1fr 1fr;
    }
    .section {
        padding: 72px 0;
    }
    .mobile-menu.open {
        display: flex;
        flex-direction: column;
        padding: 8px 24px 18px;
        background: var(--bg);
        border-bottom: 1px solid var(--border-soft);
    }
    .mobile-menu a {
        padding: 13px 4px;
        color: var(--muted-2);
        border-bottom: 1px solid var(--border-soft);
    }
    .mobile-menu .btn {
        margin-top: 14px;
        width: 100%;
    }
}

@media (max-width:560px) {
    .niche-grid {
        grid-template-columns: 1fr;
    }
    .tgrid {
        grid-template-columns: 1fr;
    }
    .hero {
        padding: 80px 0 68px;
    }
    .hero__form {
        padding: 20px;
    }
    .final__inner {
        padding: 52px 24px;
    }
    .final {
        border-radius: 24px;
    }
    .container {
        padding: 0 18px;
    }
}

/* ===== custom email form ===== */

.es-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.es-input {
    flex: 1 1 200px;
    min-width: 0;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #fff;
    font-family: var(--font-body);
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
}

.es-input::placeholder {
    color: #6a6a6a;
}

.es-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
}

.es-btn {
    flex: 0 0 auto;
    background: var(--accent);
    color: #101604;
    font-weight: 600;
    border: 0;
    border-radius: 10px;
    padding: 13px 22px;
    font-family: var(--font-body);
    font-size: 15px;
    cursor: pointer;
    transition: transform .15s, filter .15s;
}

.es-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.06);
}

.es-btn:disabled {
    opacity: .6;
    cursor: default;
    transform: none;
}

.es-ok {
    background: var(--accent-dim);
    border: 1px solid rgba(232, 255, 156, 0.4);
    color: var(--accent);
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 15px;
    text-align: center;
    font-weight: 500;
}

.es-err {
    color: #ff8a8a;
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
}

@media (max-width:520px) {
    .es-form .es-input,
    .es-form .es-btn {
        flex: 1 1 100%;
    }
}

/* ============================================================
   APP STYLES — auth, dashboard, watch view
   Extends the tokens defined in styles.css (same brand).
   ============================================================ */

:root {
  --discord: #5865F2;
  --discord-hover: #4752c4;
  --ok: #46d17f;
  --app-rail: 340px;
}

/* ---------- shared app chrome ---------- */
.appbar {
  position: sticky;
  top: 0;
  z-index: 50;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: rgba(10, 10, 10, 0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-soft);
}
.appbar .logo { font-size: 18px; }
.appbar__right { display: flex; align-items: center; gap: 14px; }

.userchip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 6px 6px 14px;
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.02);
  font-size: 14px;
  color: var(--muted-2);
}
.userchip__av {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-weight: 700; font-size: 14px;
  color: #101604;
  background: linear-gradient(135deg, var(--accent), #a8391a);
}
.userchip__img {
  width: 30px; height: 30px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}
.linkbtn {
  background: none; border: 0; cursor: pointer;
  color: var(--muted); font-size: 14px; font-family: var(--font-body);
  padding: 8px 10px; border-radius: 8px; transition: color .15s, background .15s;
}
.linkbtn:hover { color: #fff; background: rgba(255,255,255,0.04); }

/* ---------- auth pages ---------- */
.auth {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px 20px;
  position: relative;
  overflow: hidden;
}
.auth__bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(48% 40% at 50% 0%, rgba(255,66,17,0.16), transparent 70%),
    radial-gradient(60% 50% at 50% 120%, rgba(255,66,17,0.10), transparent 70%);
  pointer-events: none;
}
.auth__card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 34px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  text-align: center;
}
.auth__logo {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-head); font-weight: 600; font-size: 19px;
  margin-bottom: 26px;
}
.auth__logo img { width: 30px; }
.auth h1 {
  font-size: 26px; letter-spacing: -0.03em; margin-bottom: 8px;
}
.auth__sub { color: var(--muted-2); font-size: 15px; margin-bottom: 28px; line-height: 1.5; }

.btn--discord {
  width: 100%;
  background: var(--discord);
  color: #fff;
  border: 0;
  border-radius: 12px;
  padding: 14px 18px;
  font-family: var(--font-body);
  font-weight: 600; font-size: 15px;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  transition: background .15s, transform .15s, box-shadow .15s;
  box-shadow: 0 8px 30px rgba(88,101,242,0.28);
}
.btn--discord:hover:not(:disabled) { background: var(--discord-hover); transform: translateY(-1px); }
.btn--discord:disabled { opacity: .8; cursor: default; }

.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  display: inline-block;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.auth__alt {
  margin-top: 22px; font-size: 14px; color: var(--muted);
}
.auth__alt a { color: var(--accent); font-weight: 500; }
.auth__alt a:hover { text-decoration: underline; }
.auth__fine {
  margin-top: 26px; font-size: 12px; color: var(--muted);
  line-height: 1.5; max-width: 320px; margin-left: auto; margin-right: auto;
}
.auth__divider {
  display: flex; align-items: center; gap: 14px;
  color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
  margin: 22px 0;
}
.auth__divider::before, .auth__divider::after {
  content: ""; flex: 1; height: 1px; background: var(--border-soft);
}
.auth__perks { text-align: left; margin: 0 auto; max-width: 300px; display: grid; gap: 10px; }
.auth__perk { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; color: var(--muted-2); }
.auth__perk svg { flex: 0 0 auto; margin-top: 3px; color: var(--accent); }

/* ---------- dashboard ---------- */
.dash { padding: 40px 24px 96px; max-width: 1180px; margin: 0 auto; }
.dash__head { margin-bottom: 32px; }
.dash__head h1 { font-size: clamp(26px, 3.5vw, 34px); letter-spacing: -0.03em; }
.dash__head p { color: var(--muted-2); margin-top: 8px; font-size: 16px; }

/* resume strip */
.resume {
  display: flex; align-items: center; gap: 20px;
  background: linear-gradient(120deg, rgba(255,66,17,0.10), rgba(255,66,17,0.02));
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 36px;
}
.resume__label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); font-weight: 600; }
.resume__title { font-family: var(--font-head); font-size: 17px; margin-top: 4px; }
.resume__meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
.resume__spacer { flex: 1; }

/* course grid — mirrors the app screenshot */
.courses {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(286px, 1fr));
  gap: 18px;
}
.ccard {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .25s, transform .25s, box-shadow .25s;
  display: flex; flex-direction: column;
}
.ccard:hover {
  border-color: var(--accent-dim);
  transform: translateY(-4px);
  box-shadow: 0 16px 44px rgba(0,0,0,.45);
}
.ccard__cover {
  aspect-ratio: 16/10;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border-soft);
  background: var(--accent);
}
.ccard__cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
.ccard:hover .ccard__cover img { transform: scale(1.05); }
.ccard__prog {
  position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
  background: rgba(0,0,0,0.35);
}
.ccard__prog i { display: block; height: 100%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
.ccard__body { padding: 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.ccard__title { font-family: var(--font-head); font-size: 17px; letter-spacing: -0.02em; }
.ccard__meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 14px; font-size: 13px; color: var(--muted); margin-top: auto; }
.ccard__meta span { display: inline-flex; align-items: center; gap: 5px; }
.ccard__dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

/* ---------- course / watch view ---------- */
.watch {
  display: grid;
  grid-template-columns: var(--app-rail) 1fr;
  min-height: calc(100vh - 64px);
}
.rail {
  border-right: 1px solid var(--border-soft);
  background: var(--bg-soft);
  overflow-y: auto;
  max-height: calc(100vh - 64px);
  position: sticky; top: 64px;
}
.rail__head { padding: 22px 20px 16px; border-bottom: 1px solid var(--border-soft); }
.rail__back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.rail__back:hover { color: #fff; }
.rail__title { font-family: var(--font-head); font-size: 18px; letter-spacing: -0.02em; line-height: 1.25; }
.rail__prog { margin-top: 14px; }
.rail__bar { height: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
.rail__bar i { display: block; height: 100%; background: var(--accent); transition: width .3s; }
.rail__pct { font-size: 12px; color: var(--muted); margin-top: 7px; }

.chap { border-bottom: 1px solid var(--border-soft); }
.chap__sum {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  padding: 15px 20px; color: #fff; font-family: var(--font-head);
  font-size: 14px; letter-spacing: 0.01em;
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.chap__sum:hover { background: rgba(255,255,255,0.02); }
.chap__caret { color: var(--muted); transition: transform .2s; flex: 0 0 auto; }
.chap.open .chap__caret { transform: rotate(90deg); }
.chap__count { color: var(--muted); font-family: var(--font-body); font-weight: 400; font-size: 12px; }
.chap__list { display: none; padding: 4px 0 10px; }
.chap.open .chap__list { display: block; }

/* nested sub-chapters (e.g. "2. Ecom Masterclass" -> "Product Research MasterClass") */
.chap__sections { display: none; padding: 2px 0 6px; }
.chap.open .chap__sections { display: block; }
.chap__section { border-top: 1px solid var(--border-soft); }
.chap__section:first-child { border-top: 0; }
.chap__section-title {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  padding: 11px 20px 11px 32px; color: var(--muted-2); font-family: var(--font-head);
  font-size: 12.5px; letter-spacing: 0.02em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.chap__section-title:hover { color: #fff; background: rgba(255,255,255,0.02); }
.chap__section-title .chap__caret { width: 12px; height: 12px; }
.chap__section.open .chap__section-title .chap__caret { transform: rotate(90deg); }
.chap__section-list { display: none; padding: 0 0 8px; }
.chap__section.open .chap__section-list { display: block; }
.chap__subsection.open .chap__section-list { display: block; }
.chap__section-list .lrow { padding-left: 40px; }

/* a third nesting level (e.g. "0 - Onboarding" -> "Section 1- Onboarding") */
.chap__subsections { display: none; padding: 0; }
.chap__section.open .chap__subsections { display: block; }
.chap__subsection { border-top: 1px solid var(--border-soft); }
.chap__subsection:first-child { border-top: 0; }
.chap__subsection-title {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  padding: 10px 20px 10px 44px; color: var(--muted-2); font-family: var(--font-head);
  font-size: 12px; letter-spacing: 0.01em;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.chap__subsection-title:hover { color: #fff; background: rgba(255,255,255,0.02); }
.chap__subsection-title .chap__caret { width: 11px; height: 11px; }
.chap__subsection.open .chap__subsection-title .chap__caret { transform: rotate(90deg); }
.chap__subsection .chap__section-list .lrow { padding-left: 52px; }

.lrow {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px 10px 20px; color: var(--muted-2); font-size: 13.5px;
  font-family: var(--font-body); line-height: 1.35;
  border-left: 2px solid transparent;
  transition: background .15s, color .15s;
}
.lrow:hover { background: rgba(255,255,255,0.02); color: #fff; }
.lrow.active { background: rgba(255,66,17,0.08); color: #fff; border-left-color: var(--accent); }
.lrow__check {
  flex: 0 0 auto; width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border); display: grid; place-items: center;
}
.lrow.done .lrow__check { background: var(--accent); border-color: var(--accent); }
.lrow.done .lrow__check svg { color: #101604; }
.lrow__t { flex: 1; }
.lrow__d { flex: 0 0 auto; color: var(--muted); font-size: 12px; }

.stage { padding: 28px 32px 64px; max-width: 1000px; }
.player {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
  border: 1px solid var(--border-soft);
}
.player video { width: 100%; height: 100%; object-fit: contain; background: #000; }
.player__placeholder {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background:
    radial-gradient(60% 60% at 50% 42%, rgba(255,66,17,0.12), transparent 70%),
    #060606;
  text-align: center;
}
.player__play {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--accent); display: grid; place-items: center;
  box-shadow: 0 0 40px rgba(255,66,17,0.5); margin: 0 auto 16px;
}
.player__note { color: var(--muted); font-size: 13px; }
.player__note b { color: var(--muted-2); font-weight: 500; }

.stage__crumb { font-size: 13px; color: var(--muted); margin: 22px 0 6px; }
.stage h1 { font-size: clamp(22px, 3vw, 28px); letter-spacing: -0.03em; }
.stage__row { display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
.stage__dur { font-size: 13px; color: var(--muted); }

.markbtn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--muted-2); border-radius: 10px; padding: 9px 15px;
  font-family: var(--font-body); font-size: 14px; cursor: pointer;
  transition: all .15s;
}
.markbtn:hover { border-color: var(--accent-dim); color: #fff; }
.markbtn.is-done { background: rgba(255,66,17,0.10); border-color: var(--accent); color: var(--accent); }

.navbtns { display: flex; gap: 10px; margin-left: auto; }
.navbtns button {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--muted-2);
  border-radius: 10px; padding: 9px 15px; font-family: var(--font-body); font-size: 14px; cursor: pointer;
  transition: all .15s;
}
.navbtns button:hover:not(:disabled) { border-color: var(--accent-dim); color: #fff; }
.navbtns button:disabled { opacity: .4; cursor: default; }

/* tabs: resources / notes */
.tabs { margin-top: 34px; border-top: 1px solid var(--border-soft); }
.tabs__nav { display: flex; gap: 4px; margin-top: 18px; }
.tabs__btn {
  background: none; border: 0; cursor: pointer; color: var(--muted);
  font-family: var(--font-body); font-size: 14px; padding: 10px 14px;
  border-radius: 8px 8px 0 0; border-bottom: 2px solid transparent;
}
.tabs__btn:hover { color: #fff; }
.tabs__btn.active { color: #fff; border-bottom-color: var(--accent); }
.tabs__panel { padding: 22px 2px; display: none; }
.tabs__panel.active { display: block; }

.res {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border-soft);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  transition: border-color .15s, transform .15s;
}
.res:hover { border-color: var(--accent-dim); transform: translateX(2px); }
.res__icon {
  width: 40px; height: 40px; border-radius: 10px; flex: 0 0 auto;
  background: var(--accent-dim); color: var(--accent);
  display: grid; place-items: center;
}
.res__name { font-size: 14px; font-weight: 500; }
.res__size { font-size: 12px; color: var(--muted); margin-top: 2px; }
.res__dl { margin-left: auto; color: var(--muted); }
.res__dl:hover { color: var(--accent); }
.empty { color: var(--muted); font-size: 14px; padding: 8px 0; }

/* mobile rail toggle */
.railtoggle {
  display: none;
  position: fixed; bottom: 20px; left: 20px; z-index: 60;
  background: var(--accent); color: #101604; border: 0;
  border-radius: 999px; padding: 12px 18px; font-weight: 600;
  font-family: var(--font-body); font-size: 14px; cursor: pointer;
  box-shadow: 0 10px 30px rgba(255,66,17,0.4);
}

@media (max-width: 900px) {
  .watch { grid-template-columns: 1fr; }
  .rail {
    position: fixed; top: 64px; left: 0; bottom: 0; width: min(340px, 86vw);
    z-index: 55; transform: translateX(-105%); transition: transform .25s;
    max-height: none; border-right: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  .rail.open { transform: none; }
  .railtoggle { display: block; }
  .stage { padding: 20px 18px 80px; }
}
@media (max-width: 560px) {
  .auth__card { padding: 32px 22px; }
  .stage__row { gap: 10px; }
  .navbtns { margin-left: 0; width: 100%; }
  .navbtns button { flex: 1; }
}

</style>

/* ---- helpers (used across pages) ---- */
function getCourse(id) {
  return COURSES.find(function (c) { return c.id === id; });
}
function chapterLessons(ch) {
  var out = ch.lessons ? ch.lessons.slice() : [];
  if (ch.sections) {
    ch.sections.forEach(function (s) { out = out.concat(chapterLessons(s)); });
  }
  return out;
}
function courseStats(course) {
  var chapters = course.chapters.length;
  var lessons = 0;
  var totalMin = 0;
  course.chapters.forEach(function (ch) {
    chapterLessons(ch).forEach(function (ls) { lessons++; totalMin += parseDuration(ls.duration); });
  });
  return { chapters: chapters, lessons: lessons, duration: formatDuration(totalMin) };
}
function parseDuration(str) {
  // "1h 12m" | "52m" | "44m" -> minutes
  var h = /(\d+)\s*h/.exec(str);
  var m = /(\d+)\s*m/.exec(str);
  return (h ? +h[1] * 60 : 0) + (m ? +m[1] : 0);
}
function formatDuration(min) {
  var h = Math.floor(min / 60);
  var m = min % 60;
  if (h && m) return h + "h " + m + "m";
  if (h) return h + "h";
  return m + "m";
}
function collectLessons(ch, node, out) {
  if (node.lessons) {
    node.lessons.forEach(function (ls) { out.push({ chapter: ch, section: node === ch ? null : node, lesson: ls }); });
  }
  if (node.sections) {
    node.sections.forEach(function (s) { collectLessons(ch, s, out); });
  }
}
function allLessons(course) {
  var out = [];
  course.chapters.forEach(function (ch) { collectLessons(ch, ch, out); });
  return out;
}

</script>
  <script>
/* ============================================================
   APP LOGIC — auth, progress, and page rendering
   ------------------------------------------------------------
   Auth talks to the real backend (server.js): /api/me tells us
   who's logged in via their Discord session cookie.
   ============================================================ */

var Auth = {
  // Ask the server who's logged in. Resolves to a user object or null.
  me: function () {
    return fetch("/api/me", { credentials: "same-origin" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .catch(function () { return null; });
  },
  signOut: function () { location.href = "/auth/logout"; },
  // Gate a page: run cb(user) if signed in, else redirect to login.
  guard: function (cb) {
    this.me().then(function (user) {
      if (!user) { location.href = "login.html"; return; }
      cb(user);
    });
  },
};

/* ---- progress: which lessons are done + last position ---- */
var Progress = {
  KEY: "shipex_progress",
  all: function () {
    try { return JSON.parse(localStorage.getItem(this.KEY) || "{}"); }
    catch (e) { return {}; }
  },
  save: function (data) { localStorage.setItem(this.KEY, JSON.stringify(data)); },
  forCourse: function (courseId) { return this.all()[courseId] || { done: {}, last: null, time: {} }; },
  setLast: function (courseId, lessonId) {
    var d = this.all();
    d[courseId] = d[courseId] || { done: {}, last: null, time: {} };
    d[courseId].last = lessonId;
    this.save(d);
  },
  markDone: function (courseId, lessonId, value) {
    var d = this.all();
    d[courseId] = d[courseId] || { done: {}, last: null, time: {} };
    d[courseId].done[lessonId] = value !== false;
    this.save(d);
  },
  setTime: function (courseId, lessonId, seconds) {
    var d = this.all();
    d[courseId] = d[courseId] || { done: {}, last: null, time: {} };
    d[courseId].time[lessonId] = seconds;
    this.save(d);
  },
  percent: function (course) {
    var p = this.forCourse(course.id);
    var total = 0, done = 0;
    course.chapters.forEach(function (ch) {
      chapterLessons(ch).forEach(function (ls) { total++; if (p.done[ls.id]) done++; });
    });
    return total ? Math.round((done / total) * 100) : 0;
  },
};

/* ---- tiny helpers ---- */
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function initials(name) {
  return (name || "?").trim().slice(0, 1).toUpperCase();
}
function qs(name) {
  return new URLSearchParams(location.search).get(name);
}
// Prefer the Discord display name, fall back to the @handle.
function displayName(user) {
  return (user && (user.displayName || user.username)) || "there";
}
// Avatar chip: real Discord avatar if we have one, else an initial.
function userChip(user) {
  var name = displayName(user);
  var av = user && user.avatar
    ? '<img class="userchip__img" src="' + user.avatar + '" alt="">'
    : '<span class="userchip__av">' + initials(name) + '</span>';
  return av + '<span>' + name + '</span>';
}
</script>
  <script>
   Auth.guard(function (user) {
    document.getElementById("userchip").innerHTML = userChip(user);
    document.getElementById("logout").addEventListener("click", function () { Auth.signOut(); });

    var course = getCourse(qs("c")) || COURSES[0];
    var flat = allLessons(course);

    document.getElementById("railTitle").textContent = course.title;
    document.getElementById("tab-about").innerHTML =
      '<p style="color:var(--muted-2);font-size:15px;line-height:1.6;">' + (course.tagline || '') + '</p>';

    if (!flat.length) {
      document.getElementById("chapters").innerHTML =
        '<p style="padding:20px;color:var(--muted-2);font-size:13px;">No lessons yet — check back soon.</p>';
      document.getElementById("crumb").textContent = "";
      document.getElementById("lessonTitle").textContent = "Coming soon";
      document.querySelector(".player__note").innerHTML =
        "<b>Nothing here yet</b> — this course's content is being added.";
      document.querySelector(".stage__row").style.display = "none";
      document.querySelector(".tabs__nav").style.display = "none";
      document.getElementById("tab-res").classList.remove("active");
      document.getElementById("tab-about").classList.add("active");
      return;
    }

    var current = qs("l") || (Progress.forCourse(course.id).last) || flat[0].lesson.id;

    function indexOfLesson(id) {
      for (var i = 0; i < flat.length; i++) if (flat[i].lesson.id === id) return i;
      return 0;
    }

    /* ---- build chapter rail ---- */
    function buildRail() {
      var wrap = document.getElementById("chapters");
      wrap.innerHTML = "";
      var prog = Progress.forCourse(course.id);

      function buildLessonRow(ls) {
        var row = el("button", "lrow" + (ls.id === current ? " active" : "") + (prog.done[ls.id] ? " done" : ""));
        row.innerHTML =
          '<span class="lrow__check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' +
          '<span class="lrow__t">' + ls.title + '</span>' +
          '<span class="lrow__d">' + ls.duration + '</span>';
        row.addEventListener("click", function () { go(ls.id); document.getElementById("rail").classList.remove("open"); });
        return row;
      }

      // renders a node's own lessons (if any) and its child sections (if any) into container.
      // depth 0 = a chapter's direct content, depth 1+ = nested sections at any further depth.
      function buildNodeContent(node, container, depth) {
        if (node.lessons) {
          var list = el("div", depth === 0 ? "chap__list" : "chap__section-list");
          node.lessons.forEach(function (ls) { list.appendChild(buildLessonRow(ls)); });
          container.appendChild(list);
        }
        if (node.sections) {
          var wrap = el("div", depth === 0 ? "chap__sections" : "chap__subsections");
          node.sections.forEach(function (child) {
            var childLessons = chapterLessons(child);
            var hasCur = childLessons.some(function (l) { return l.id === current; });
            var childEl = el("div", (depth === 0 ? "chap__section" : "chap__subsection") + (hasCur ? " open" : ""));
            var sum = el("button", depth === 0 ? "chap__section-title" : "chap__subsection-title");
            sum.innerHTML =
              '<span>' + child.title + ' <span class="chap__count">· ' + childLessons.length + '</span></span>' +
              '<svg class="chap__caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';
            sum.addEventListener("click", function () { childEl.classList.toggle("open"); });
            childEl.appendChild(sum);
            buildNodeContent(child, childEl, depth + 1);
            wrap.appendChild(childEl);
          });
          container.appendChild(wrap);
        }
      }

      course.chapters.forEach(function (ch, chIdx) {
        var chLessons = chapterLessons(ch);
        var hasCurrent = chLessons.some(function (l) { return l.id === current; });
        var chEl = el("div", "chap" + (hasCurrent ? " open" : ""));
        var sum = el("button", "chap__sum");
        sum.innerHTML =
          '<span>' + (chIdx + 1) + '. ' + ch.title + ' <span class="chap__count">· ' + chLessons.length + '</span></span>' +
          '<svg class="chap__caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';
        sum.addEventListener("click", function () { chEl.classList.toggle("open"); });
        chEl.appendChild(sum);

        buildNodeContent(ch, chEl, 0);
        wrap.appendChild(chEl);
      });
      // progress bar
      var pct = Progress.percent(course);
      document.getElementById("railBar").style.width = pct + "%";
      document.getElementById("railPct").textContent = pct + "% complete";
    }

    /* ---- load a lesson into the stage ---- */
    var video = document.getElementById("video");
    var placeholder = document.getElementById("placeholder");

    function loadLesson(id) {
      var found = flat[indexOfLesson(id)];
      var ch = found.chapter, ls = found.lesson;

      document.getElementById("crumb").textContent = ch.title;
      document.getElementById("lessonTitle").textContent = ls.title;

      // player: real video if src set, else placeholder
      if (ls.src) {
        placeholder.style.display = "none";
        video.style.display = "block";
        video.src = ls.src;
        if (ls.poster) video.poster = ls.poster;
        // resume position
        var t = Progress.forCourse(course.id).time[ls.id];
        video.onloadedmetadata = function () { if (t) video.currentTime = t; };
        video.ontimeupdate = function () {
          if (video.currentTime) Progress.setTime(course.id, ls.id, Math.floor(video.currentTime));
        };
        video.onended = function () { setDone(true); goNext(); };
      } else {
        video.style.display = "none";
        video.removeAttribute("src");
        placeholder.style.display = "grid";
      }

      // resources
      var resWrap = document.getElementById("tab-res");
      if (ls.resources && ls.resources.length) {
        resWrap.innerHTML = ls.resources.map(function (r) {
          return '<div class="res">' +
            '<span class="res__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>' +
            '<div><div class="res__name">' + r.name + '</div><div class="res__size">' + r.size + '</div></div>' +
            '<a class="res__dl" title="Download" href="#" onclick="return false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>' +
          '</div>';
        }).join("");
      } else {
        resWrap.innerHTML = '<p class="empty">No attachments for this lesson.</p>';
      }

      // mark-complete button state
      updateMarkBtn();
      // prev/next disabled state
      var idx = indexOfLesson(id);
      document.getElementById("prevBtn").disabled = idx === 0;
      document.getElementById("nextBtn").disabled = idx === flat.length - 1;
    }

    function setDone(val) {
      Progress.markDone(course.id, current, val);
      buildRail();
      updateMarkBtn();
    }
    function updateMarkBtn() {
      var done = !!Progress.forCourse(course.id).done[current];
      var btn = document.getElementById("markBtn");
      btn.classList.toggle("is-done", done);
      document.getElementById("markLabel").textContent = done ? "Completed" : "Mark complete";
    }

    function go(id) {
      current = id;
      Progress.setLast(course.id, id);
      history.replaceState(null, "", "course.html?c=" + course.id + "&l=" + id);
      buildRail();
      loadLesson(id);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function goNext() {
      var idx = indexOfLesson(current);
      if (idx < flat.length - 1) go(flat[idx + 1].lesson.id);
    }
    function goPrev() {
      var idx = indexOfLesson(current);
      if (idx > 0) go(flat[idx - 1].lesson.id);
    }

    document.getElementById("markBtn").addEventListener("click", function () {
      setDone(!Progress.forCourse(course.id).done[current]);
    });
    document.getElementById("nextBtn").addEventListener("click", goNext);
    document.getElementById("prevBtn").addEventListener("click", goPrev);
    document.getElementById("railToggle").addEventListener("click", function () {
      document.getElementById("rail").classList.toggle("open");
    });

    // tabs
    document.querySelectorAll(".tabs__btn").forEach(function (b) {
      b.addEventListener("click", function () {
        document.querySelectorAll(".tabs__btn").forEach(function (x) { x.classList.remove("active"); });
        document.querySelectorAll(".tabs__panel").forEach(function (x) { x.classList.remove("active"); });
        b.classList.add("active");
        document.getElementById("tab-" + b.dataset.tab).classList.add("active");
      });
    });

    // init
    Progress.setLast(course.id, current);
    buildRail();
    loadLesson(current);
   });
  </script>
